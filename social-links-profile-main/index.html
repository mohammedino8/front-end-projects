<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Social links profile</title>
  <link rel="stylesheet" href="style.css">
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
<div class="hero">
  <div class="img">
    <img src="./assets/images/avatar-jessica.jpeg" alt="">
  </div>
  <div class="info">
    <h2 class="name">  Jessica Randall</h2>
    <div class="location">London, United Kingdom</div>
    <div class="description">"Front-end developer and avid reader."</div>
  </div>
  <div class="links">
    <ul>
      <li><a href="https://github.com">GitHub</a></li>
      <li><a href="https://www.frontendmentor.io">Frontend Mentor</a></li>
      <li><a href="www.linkedin.com">LinkedIn</a></li>
      <li><a href="https://x.com">Twitter</a></li>
      <li><a href="https://instagram.com">Instagram</a></li>
    </ul>
  </div>
</div>

  
  

  
  
  
  
  
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/mohammedino8">Fikri Mohammed Amine</a>.
  </footer>
</body>
</html>
