<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="css/style.css">

  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');

:root{
--White: hsl(0, 0%, 100%);
--Slate-300: hsl(212, 45%, 89%);
--Slate-500: hsl(216, 15%, 48%);
--Slate-900: hsl(218, 44%, 22%);
}

body{
    background-color:var(--Slate-300);
    min-height: 100vh;
    display: flex;
    flex-direction: column;   /* مهم */
    justify-content: center;
    align-items: center;
    margin: 0;                /* مهم */
}

.hero{
    background-color: var(--White);
    width: 250px;
    border-radius: 15px;
    padding-bottom: 15px;
}

.hero p{
    font-size: 15px;
    font-family: "Outfit", sans-serif;
    text-align: center;
    width: 80%;
    display: inline-block;
    margin: 10px 0;
}

.par{
    text-align: center;
}

.one{
    font-weight: 700;
    color: var(--Slate-900);
}

.two{
    margin-top: 10px;
    font-weight: 400;
    color: var(--Slate-500);
}

.img{
    text-align: center;
}

.img img{
    width: 90%;
    border-radius: 10px;
    margin-top: 15px;
}

/* Footer */

.attribution {
    font-size: 11px;
    text-align: center;
    font-family: "Outfit", sans-serif;
    margin-top: 20px;
}

.attribution a {
    color: hsl(228, 45%, 44%);
    text-decoration: none;
}

.attribution a:hover {
    text-decoration: underline;
}
  </style>
</head>
<body>

  <div class="hero">
    <div class="img"><img src="images/image-qr-code.png" alt=""></div>
    <div class="par">
    <p class="one">Improve your front-end skills by building projects</p>
    <p class="two">
  Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
  </div>
</div>

  
<footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Fikri mohammed Amine</a>.
  </footer>

</body>
</html>
