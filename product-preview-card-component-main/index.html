<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Fraunces:wght@700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>CSS project 4 by Fikri</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main>
      <picture class="img">
    <source media="(min-width: 768px)" srcset="./images/image-product-desktop.jpg">
    <img src="./images/image-product-mobile.jpg" alt="Gabrielle Essence Eau De Parfum bottle">
  </picture>
    <section class="content">
          <div class="tag">
            Perfume
          </div>
          <h2>
          Gabrielle Essence Eau De Parfum
          </h2>
          <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.</p>
          <div class="price">
              <span class="new-price">$149.99</span>
              <span class="old-price">$169.99</span>
          </div>
    
    <button class="btn">
  <img src="./images/icon-cart.svg" alt="">
  Add to Cart
</button>
</section>
  </main>
  
  

  
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/mohammedino8">Your Name Here</a>.
  </footer>
</body>
</html>
